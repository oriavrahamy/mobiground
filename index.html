    // ---- BROKEN PHONE: WRITING ----
    function renderBrokenPhoneWriting(container, data) {
      const me = data.players?.[state.user?.uid];
      if (!me) {
        container.innerHTML = `<div class="text-center p-8"><div class="glass-card bg-red-300 p-6 font-bold text-xl">אירעה שגיאה - לא שובצת למשחק</div></div>`;
        return;
      }

      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      if (window._drawWatch) { clearInterval(window._drawWatch); window._drawWatch = null; }

      const info = getMyChainInfo(data);
      const allPlayers = Object.values(data.players);
      const endTime = data.writingEndTime || (Date.now() + WRITING_DURATION * 1000);
      const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
      const hasSubmitted = info?.myEntry?.text && info.myEntry.text.length > 0;

      container.innerHTML = `
        <div class="max-w-lg mx-auto">
          <div class="flex items-center justify-between mb-3">
            <div class="room-label">📞 טלפון שבור</div>
            <div class="flex items-center gap-2">
              <span class="font-bold text-sm">שלב ${(info?.R || 0) + 1}/${info?.N || '...'}</span>
              <div id="bp-writing-timer" class="timer-ring ${remaining <= 5 ? 'urgent' : ''}">${remaining}</div>
            </div>
          </div>

          <div class="glass-card p-4 mb-4">
            ${!info?.prevEntry ? `
              <p class="font-bold text-lg mb-3 text-center" style="color:#00e5a0">כתוב משפט להתחלת השרשרת!</p>
            ` : info.prevEntry.type === 'drawing' ? `
              <p class="section-title text-sm mb-1">הציור שקיבלת:</p>
              <div style="aspect-ratio:4/3;background:#fff;border-radius:8px;margin-bottom:12px">
                <canvas id="prev-drawing-canvas" style="width:100%;height:100%"></canvas>
              </div>
              <p class="text-sm font-bold mb-2">תאר במילים את מה שרואים בציור:</p>
            ` : `
              <div class="glass-card-flat p-3 mb-3">
                <p class="section-title text-sm mb-1">המשפט שקיבלת:</p>
                <p class="font-bold text-lg" style="color:#00e5a0">${info.prevEntry.text}</p>
              </div>
            `}
            <textarea id="bp-writing-input" class="inp w-full p-3 font-bold" placeholder="כתוב כאן..." maxlength="200" rows="3" ${hasSubmitted ? 'disabled' : ''}>${info?.myEntry?.text || ''}</textarea>
          </div>

          <div class="flex gap-2">
            <button id="btn-submit-text" class="btn-mint flex-1 py-3 font-bold" ${hasSubmitted ? 'disabled' : ''}>${hasSubmitted ? '✅ נשלח' : 'שלח'}</button>
            ${state.isHost ? `
              <button id="btn-advance-bp" class="btn-purple px-4 py-3 font-bold">המשך</button>
            ` : ''}
          </div>
        </div>
      `;
      updateAvatarPreviews(container);

      // Render previous drawing if exists
      if (info?.prevEntry?.type === 'drawing' && info.prevEntry.strokes?.length > 0) {
        setTimeout(() => {
          const canvasEl = $('#prev-drawing-canvas');
          if (!canvasEl) return;
          const parent_ = canvasEl.parentElement;
          const dpr = window.devicePixelRatio || 1;
          const w = parent_.clientWidth;
          const h = parent_.clientHeight;
          canvasEl.width = w * dpr;
          canvasEl.height = h * dpr;
          canvasEl.style.width = w + 'px';
          canvasEl.style.height = h + 'px';
          const ctx = canvasEl.getContext('2d');
          ctx.scale(dpr, dpr);
          redrawCanvas(ctx, w, h, info.prevEntry.strokes);
        }, 50);
      }

      // Submit text
      const submitBtn = $('#btn-submit-text');
      if (submitBtn) {
        submitBtn.addEventListener('click', () => {
          const text = $('#bp-writing-input').value.trim();
          if (!text) { toast('נא לכתוב משהו', true); return; }
          SOUND.click();
          saveTextRealtime(text);
          submitBtn.disabled = true;
          submitBtn.textContent = '✅ נשלח';
        });
      }

      // Host advance
      const advBtn = $('#btn-advance-bp');
      if (advBtn) {
        advBtn.addEventListener('click', () => {
          SOUND.click();
          advanceBrokenPhone();
        });
      }

      // Countdown timer
      const timerEl_ = $('#bp-writing-timer');
      if (timerEl_) {
        let lastTick_ = -1;
        state.timerInterval = setInterval(() => {
          const e = data.writingEndTime || (Date.now() + WRITING_DURATION * 1000);
          const r = Math.max(0, Math.ceil((e - Date.now()) / 1000));
          timerEl_.textContent = r;
          timerEl_.className = 'timer-ring' + (r <= 5 ? ' urgent' : '');
          if (r <= 5 && r !== lastTick_) { lastTick_ = r; SOUND.tick(); }
          if (r <= 0 && state.isHost) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            if (state.gameData?.phase === 'writing') {
              advanceBrokenPhone();
            }
          }
        }, 200);
      }

      // Auto-save text on input every 2s
      const textInput = $('#bp-writing-input');
      if (textInput && !hasSubmitted) {
        let saveTimer = null;
        textInput.addEventListener('input', () => {
          if (saveTimer) clearTimeout(saveTimer);
          saveTimer = setTimeout(() => {
            const val = textInput.value.trim();
            if (val) saveTextRealtime(val);
          }, 2000);
        });
      }
    }

    // ---- BROKEN PHONE: DRAWING ----
    function renderBrokenPhoneDrawing(container, data) {
      const me = data.players?.[state.user?.uid];
      if (!me) {
        container.innerHTML = `<div class="text-center p-8"><div class="glass-card bg-red-300 p-6 font-bold text-xl">אירעה שגיאה - לא שובצת למשחק</div></div>`;
        return;
      }

      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      if (window._drawWatch) { clearInterval(window._drawWatch); window._drawWatch = null; }

      const info = getMyChainInfo(data);
      const allPlayers = Object.values(data.players);
      const endTime = data.drawingEndTime || (Date.now() + DRAWING_DURATION * 1000);
      const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
      const existingStrokes = info?.myEntry?.strokes || [];

      container.innerHTML = `
        <div class="max-w-lg mx-auto">
          <div class="flex items-center justify-between mb-3">
            <div class="room-label">📞 טלפון שבור</div>
            <div class="flex items-center gap-2">
              <span class="font-bold text-sm">שלב ${(info?.R || 0) + 1}/${info?.N || '...'}</span>
              <div id="bp-drawing-timer" class="timer-ring ${remaining <= 5 ? 'urgent' : ''}">${remaining}</div>
            </div>
          </div>

          <div class="glass-card p-4 mb-4">
            ${info?.prevEntry?.type === 'text' ? `
              <div class="glass-card-flat p-3 mb-3">
                <p class="section-title text-sm mb-1">המשפט שקיבלת:</p>
                <p class="font-bold text-lg" style="color:#00e5a0">${info.prevEntry.text}</p>
              </div>
            ` : `
              <p class="font-bold text-lg mb-3 text-center" style="color:#00e5a0">צייר משהו שתואם את הטקסט!</p>
            `}
          </div>

          <div class="canvas-wrapper relative" style="aspect-ratio:4/3;max-height:55vh">
            <canvas id="bp-draw-canvas"></canvas>
          </div>

          <div class="mt-3 flex flex-wrap items-center gap-2 drawing-tools">
            <div class="flex gap-1">
              ${COLORS.map(c => `
                <button class="color-btn ${c === state.drawing.currentColor ? 'active' : ''}" data-color="${c}" style="background:${c}"></button>
              `).join('')}
            </div>
            <div class="flex gap-1 mr-2">
              ${WIDTHS.map((w) => `
                <button class="width-btn ${w === state.drawing.currentWidth ? 'active' : ''}" data-width="${w}" style="width:36px;height:36px">
                  <div style="width:${w+2}px;height:${w+2}px;background:#000;border-radius:50%"></div>
                </button>
              `).join('')}
            </div>
            <button id="btn-clear-bp" class="btn-purple px-3 py-1 font-bold text-sm">נקה</button>
          </div>

          <div class="flex gap-2 mt-3">
            ${state.isHost ? `
              <button id="btn-advance-bp-draw" class="btn-mint flex-1 py-3 font-bold">המשך</button>
            ` : ''}
          </div>
        </div>
      `;
      updateAvatarPreviews(container);

      // Setup canvas
      const canvasEl = $('#bp-draw-canvas');
      if (canvasEl) {
        if (canvasEl._cleanup) canvasEl._cleanup();
        state.drawing.canvas = null;
        state.drawing.ctx = null;
        state.drawing.strokes = JSON.parse(JSON.stringify(existingStrokes));
        setupCollaborativeCanvas(canvasEl, state.drawing.strokes);

        // Color buttons
        $$('.color-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.drawing.currentColor = btn.dataset.color;
            $$('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          });
        });

        // Width buttons
        $$('.width-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.drawing.currentWidth = parseInt(btn.dataset.width);
            $$('.width-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          });
        });

        // Clear button
        const clearBtn = $('#btn-clear-bp');
        if (clearBtn) {
          clearBtn.addEventListener('click', () => {
            state.drawing.strokes = [];
            const canvas_ = state.drawing.canvas;
            if (canvas_) {
              const dpr_ = window.devicePixelRatio || 1;
              const w_ = canvas_.width / dpr_;
              const h_ = canvas_.height / dpr_;
              redrawCanvas(state.drawing.ctx, w_, h_, state.drawing.strokes);
            }
          });
        }

        // No _drawWatch needed - each player only sees their own strokes
      }

      // Host advance
      const advBtn = $('#btn-advance-bp-draw');
      if (advBtn) {
        advBtn.addEventListener('click', () => {
          SOUND.click();
          advanceBrokenPhone();
        });
      }

      // Countdown timer
      const timerEl_ = $('#bp-drawing-timer');
      if (timerEl_) {
        let lastTick_ = -1;
        state.timerInterval = setInterval(() => {
          const e = data.drawingEndTime || (Date.now() + DRAWING_DURATION * 1000);
          const r = Math.max(0, Math.ceil((e - Date.now()) / 1000));
          timerEl_.textContent = r;
          timerEl_.className = 'timer-ring' + (r <= 5 ? ' urgent' : '');
          if (r <= 5 && r !== lastTick_) { lastTick_ = r; SOUND.tick(); }
          if (r <= 0 && state.isHost) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            if (state.gameData?.phase === 'drawing' && (state.gameData.gameMode || DEFAULT_GAME_MODE) === 'broken-phone') {
              advanceBrokenPhone();
            }
          }
        }, 200);
      }
    }

    // ---- BROKEN PHONE: SHOWCASE ----
    function renderShowcase(container, data) {
      const me = data.players?.[state.user?.uid];
      const players = Object.values(data.players || {});
      const playerOrder = data.playerOrder || players.map(p => p.id);
      const N = playerOrder.length;
      const chainEntries = data.chainEntries || {};
      const myVote = data.chainVotes?.[state.user?.uid];
      const allVotesIn_ = playerOrder.every(pid => data.chainVotes?.[pid] !== undefined);

      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }

      // Build chains display
      let chainsHtml = '';
      for (let ci = 0; ci < N; ci++) {
        const startPid = playerOrder[ci];
        const startPlayer = data.players[startPid];
        let entriesHtml = '';
        for (let ei = 0; ei < N; ei++) {
          const key = `${ci}_${ei}`;
          const entry = chainEntries[key];
          if (!entry) continue;
          const entryPlayer = data.players[entry.playerId];
          const isText = entry.type === 'text';
          const entryContent = isText
            ? `<div class="glass-card-flat p-3 font-bold text-lg" style="background:rgba(0,229,160,0.08);border-color:rgba(0,229,160,0.15)">${entry.text || '...'}</div>`
            : `<div style="aspect-ratio:4/3;background:#fff;border-radius:8px"><canvas id="sc-drawing-${ci}-${ei}" style="width:100%;height:100%"></canvas></div>`;
          entriesHtml += `
            <div class="mb-2">
              <div class="flex items-center gap-2 mb-1">
                <div class="player-avatar" style="width:26px;height:26px;font-size:13px">${renderAvatar(entryPlayer, 26)}</div>
                <span class="font-bold text-xs" style="color:${playerColor(entry.playerId, playerOrder)}">${entryPlayer?.name || '?'}</span>
              </div>
              ${entryContent}
            </div>
          `;
        }
        const chainVoteCount = Object.values(data.chainVotes || {}).filter(v => v === ci).length;
        chainsHtml += `
          <div class="glass-card p-4 mb-4 ${myVote === ci ? 'ring-2' : ''}" style="${myVote === ci ? 'border-color:#00e5a0' : ''}">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <div class="player-avatar" style="width:32px;height:32px;font-size:16px">${renderAvatar(startPlayer, 32)}</div>
                <span class="font-bold">${startPlayer?.name || '?'}</span>
              </div>
              <div class="text-sm hint-text">${chainVoteCount} הצבעות</div>
            </div>
            ${entriesHtml}
            <div class="mt-3 text-center">
              <button class="btn-vote-chain ${myVote === ci ? 'btn-mint' : 'btn-purple'} px-5 py-2 font-bold" data-chain="${ci}" ${myVote !== undefined ? 'disabled' : ''}>
                ${myVote === ci ? '✅ הצבעת!' : 'הצבע לשרשרת הזו'}
              </button>
            </div>
          </div>
        `;
      }

      container.innerHTML = `
        <div class="max-w-lg mx-auto">
          <div class="text-center mb-4">
            <h1 class="text-3xl font-black text-white">📞 טלפון שבור</h1>
            <p class="font-bold" style="color:#00e5a0">כל השרשראות</p>
            <p class="text-sm hint-text">הצבע על השרשרת המוצלחת ביותר!</p>
          </div>
          ${chainsHtml}
          ${state.isHost && (myVote !== undefined || allVotesIn_) ? `
            <div class="text-center mt-4 mb-8">
              <button id="btn-bp-leaderboard" class="btn-mint px-8 py-4 text-xl font-bold">🏆 לוח הניקוד</button>
            </div>
          ` : ''}
        </div>
      `;
      updateAvatarPreviews(container);

      // Render all showcase drawings
      setTimeout(() => {
        for (let ci = 0; ci < N; ci++) {
          for (let ei = 0; ei < N; ei++) {
            const key = `${ci}_${ei}`;
            const entry = chainEntries[key];
            if (!entry || entry.type !== 'drawing' || !entry.strokes?.length) continue;
            const canvasEl = document.getElementById(`sc-drawing-${ci}-${ei}`);
            if (!canvasEl) continue;
            const parent_ = canvasEl.parentElement;
            const dpr_ = window.devicePixelRatio || 1;
            const w = parent_.clientWidth;
            const h = parent_.clientHeight;
            canvasEl.width = w * dpr_;
            canvasEl.height = h * dpr_;
            canvasEl.style.width = w + 'px';
            canvasEl.style.height = h + 'px';
            const ctx = canvasEl.getContext('2d');
            ctx.scale(dpr_, dpr_);
            redrawCanvas(ctx, w, h, entry.strokes);
          }
        }
      }, 100);

      // Vote buttons
      $$('.btn-vote-chain').forEach(btn => {
        btn.addEventListener('click', async () => {
          const chainIdx = parseInt(btn.dataset.chain);
          SOUND.vote();
          try {
            await state.gameRef.update({
              [`chainVotes.${state.user.uid}`]: chainIdx,
            });
          } catch (e) {}
        });
      });

      // Leaderboard advance
      const lbBtn = $('#btn-bp-leaderboard');
      if (lbBtn) {
        lbBtn.addEventListener('click', async () => {
          SOUND.click();
          await _finishBrokenPhone();
        });
      }
    }

    async function _finishBrokenPhone() {
      const data = state.gameData;
      if (!data) return;
      const playerOrder = data.playerOrder || Object.keys(data.players || {});
      const chainVotes = data.chainVotes || {};
      const updates = { phase: 'leaderboard' };
      for (const [voterId, chainIdx] of Object.entries(chainVotes)) {
        const startPid = playerOrder[chainIdx];
        if (startPid) {
          updates[`players.${startPid}.score`] = firebase.firestore.FieldValue.increment(10);
        }
      }
      for (const voterId of Object.keys(chainVotes)) {
        updates[`players.${voterId}.score`] = firebase.firestore.FieldValue.increment(5);
      }
      try {
        await state.gameRef.update(updates);
      } catch (e) {
        console.error('_finishBrokenPhone failed:', e);
      }
    }

    // ---- ALIAS (ELIAS GAME) ----
    function renderAlias(container, data) {
      const me = data.players?.[state.user?.uid];
      if (!me) {
        container.innerHTML = `<div class="text-center p-8"><div class="glass-card bg-red-300 p-6 font-bold text-xl">אירעה שגיאה</div></div>`;
        return;
      }

      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }

      const savedChatInput = $('#alias-chat-input')?.value || '';

      const playerOrder = data.playerOrder || Object.values(data.players).map(p => p.id);
      const explainerIdx = data.aliasExplainerIdx || 0;
      const explainerPid = playerOrder[explainerIdx];
      const explainer = data.players[explainerPid];
      const isExplainer = state.user?.uid === explainerPid;
      const allPlayers = Object.values(data.players);
      const endTime = data.aliasEndTime || (Date.now() + ALIAS_ROUND_DURATION * 1000);
      const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
      const chatMsgs = data.chatMessages || [];
      const guessed = data.aliasGuessed;
      const showCelebration = guessed && data.aliasGuesserId;
      const guesserName = showCelebration ? data.players[data.aliasGuesserId]?.name || '?' : '';

      const isFinished = Object.values(data.players).some(p => (p.score || 0) >= (data.aliasTargetScore || ALIAS_TARGET_SCORE));

      container.innerHTML = `
        <div class="max-w-3xl mx-auto">
          <div class="flex items-center justify-between mb-3">
            <div class="room-label">🗣️ אליאס</div>
            <div class="flex items-center gap-3">
              <span class="text-sm hint-text">יעד: ${data.aliasTargetScore || ALIAS_TARGET_SCORE} נק'</span>
              <div id="alias-timer" class="timer-ring ${remaining <= 10 ? 'urgent' : ''}">${remaining}</div>
            </div>
          </div>

          ${!isExplainer ? `
            <div class="glass-card p-4 mb-3 text-center">
              <div class="flex items-center justify-center gap-2 mb-2">
                <div class="player-avatar" style="width:36px;height:36px;font-size:18px">${renderAvatar(explainer, 36)}</div>
                <span class="font-bold text-xl" style="color:#00e5a0">${explainer?.name || '?'}</span>
              </div>
              <p class="font-bold text-lg">מסביר כרגע...</p>
              <div class="flex gap-1 justify-center mt-2">
                ${Array.from({ length: data.aliasWord?.length || 0 }, (_, i) => `<span class="inline-block w-6 h-8 border-b-2 border-[#00e5a0] mx-0.5 text-center font-bold text-lg" style="color:#00e5a0"></span>`).join('')}
              </div>
            </div>
          ` : `
            <div class="glass-card p-4 mb-3 text-center">
              <p class="font-bold mb-2" style="color:#00e5a0">זה התור שלך! תסביר לחברים!</p>
              <div class="text-4xl font-black mb-3" style="color:#fff;letter-spacing:2px">${data.aliasWord}</div>
              <div class="flex flex-wrap gap-2 justify-center mb-2">
                ${(data.aliasTaboo || []).map(t => `<span class="px-3 py-1 font-bold text-sm" style="background:rgba(255,107,107,0.2);border:1px solid rgba(255,107,107,0.4);border-radius:8px;color:#ff6b6b">✕ ${t}</span>`).join('')}
              </div>
              ${!data.aliasSkipUsed?.[state.user?.uid] ? `
                <button id="btn-skip-word" class="btn-purple px-4 py-1 text-sm font-bold">דלג (−1 נק')</button>
              ` : ''}
            </div>
          `}

          <div class="glass-card p-3 mb-3" style="max-height:50vh;overflow-y:auto;display:flex;flex-direction:column">
            <div id="alias-chat-messages" class="flex-1 space-y-2 mb-3" style="min-height:200px;max-height:40vh;overflow-y:auto">
              ${chatMsgs.map(msg => {
                const p = data.players?.[msg.pid];
                const isMe = msg.pid === state.user?.uid;
                return `<div class="flex items-start gap-2 ${isMe ? 'justify-start' : ''}">
                  <div class="player-avatar" style="width:24px;height:24px;font-size:12px">${renderAvatar(p, 24)}</div>
                  <div class="${isMe ? 'font-bold' : ''}" style="background:${isMe ? 'rgba(0,229,160,0.12)' : 'rgba(255,255,255,0.05)'};border-radius:8px;padding:4px 10px;max-width:80%">
                    <span class="text-xs hint-text">${p?.name || '?'}</span>
                    <div class="font-bold text-sm">${msg.text}</div>
                  </div>
                </div>`;
              }).join('')}
            </div>
            <div class="flex gap-2">
              <input id="alias-chat-input" class="inp flex-1 p-2 font-bold" placeholder="הקלד ניחוש..." maxlength="100" ${guessed || isExplainer ? 'disabled' : ''}>
              <button id="btn-alias-send" class="btn-mint px-4 py-2 font-bold" ${guessed || isExplainer ? 'disabled' : ''}>שלח</button>
            </div>
          </div>

          <div class="flex flex-wrap gap-2">
            ${allPlayers.map(p => {
              const pidx = playerOrder.indexOf(p.id);
              const isOnTurn = p.id === explainerPid;
              return `<div class="player-card" style="padding:4px 10px;gap:6px;border-right:4px solid ${isOnTurn ? '#00e5a0' : 'transparent'};${isOnTurn ? 'background:rgba(0,229,160,0.08)' : ''}">
                ${renderAvatar(p, 24)}
                <span class="font-bold text-xs">${p.name}</span>
                <span class="text-xs hint-text">${p.score || 0} נק'</span>
                ${isOnTurn ? '<span class="text-xs font-bold" style="color:#00e5a0">🎤</span>' : ''}
              </div>`;
            }).join('')}
          </div>

          ${state.isHost && !guessed && remaining <= 0 ? `
            <div class="mt-3 text-center">
              <button id="btn-advance-alias" class="btn-mint px-6 py-2 font-bold">הבא בתור →</button>
            </div>
          ` : ''}
        </div>

        ${showCelebration ? `
          <div id="alias-celebration" class="fixed inset-0 flex items-center justify-center" style="z-index:100;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)">
            <div class="glass-card p-8 text-center" style="animation:aliasPop 0.5s cubic-bezier(0.34,1.56,0.64,1)">
              <div style="font-size:64px;margin-bottom:12px">🎉</div>
              <h2 class="text-3xl font-black mb-2 text-white">ניחוש נכון!</h2>
              <p class="text-xl font-bold" style="color:#00e5a0">${guesserName} ניחש את המילה!</p>
              <p class="text-sm hint-text mt-1">+1 נק' ל${guesserName} +1 נק' ל${explainer?.name || '?'}</p>
            </div>
          </div>
        ` : ''}
      `;
      updateAvatarPreviews(container);

      // Restore chat input after re-render
      const restoredInput = $('#alias-chat-input');
      if (restoredInput && savedChatInput) restoredInput.value = savedChatInput;

      // Scroll chat to bottom
      const chatEl = $('#alias-chat-messages');
      if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;

      // Chat send
      const sendBtn = $('#btn-alias-send');
      const chatInput = $('#alias-chat-input');
      if (sendBtn && chatInput) {
        const doSend = async () => {
          const text = chatInput.value.trim();
          if (!text) return;
          SOUND.click();
          chatInput.value = '';
          const msg = await saveChatMessage(text);
          if (msg && isCorrectGuess(text, data.aliasWord) && !data.aliasGuessed) {
            await state.gameRef.update({
              aliasGuessed: true,
              aliasGuesserId: state.user.uid,
              aliasGuessedAt: Date.now(),
            });
          }
        };
        sendBtn.addEventListener('click', doSend);
        chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });
      }

      // Skip button
      const skipBtn = $('#btn-skip-word');
      if (skipBtn) {
        skipBtn.addEventListener('click', async () => {
          SOUND.error();
          await state.gameRef.update({
            [`aliasSkipUsed.${state.user.uid}`]: true,
            [`players.${state.user.uid}.score`]: firebase.firestore.FieldValue.increment(-1),
          });
          advanceAliasTurn();
        });
      }

      // Host advance
      const advBtn = $('#btn-advance-alias');
      if (advBtn) {
        advBtn.addEventListener('click', () => {
          SOUND.click();
          advanceAliasTurn();
        });
      }

      // Celebration auto-advance by host (with guard)
      if (state.isHost && showCelebration && !state._aliasAdvancing) {
        state._aliasAdvancing = true;
        setTimeout(() => {
          state._aliasAdvancing = false;
          if (state.gameData?.aliasGuessed) {
            advanceAliasTurn();
          }
        }, 2500);
      }

      // Timer
      const timerEl = $('#alias-timer');
      if (timerEl) {
        let lastTick = -1;
        state.timerInterval = setInterval(() => {
          const e = data.aliasEndTime || (Date.now() + ALIAS_ROUND_DURATION * 1000);
          const r = Math.max(0, Math.ceil((e - Date.now()) / 1000));
          timerEl.textContent = r;
          timerEl.className = 'timer-ring' + (r <= 10 ? ' urgent' : '');
          if (r <= 5 && r !== lastTick) { lastTick = r; SOUND.tick(); }
          if (r <= 0 && state.isHost && !state.gameData?.aliasGuessed) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            if (state.gameData?.phase === 'explaining') {
              advanceAliasTurn();
            }
          }
        }, 200);
      }
    }

    // ---- DRAWING (COLLABORATIVE) ----
    function renderDrawing(container, data) {
      const me = data.players?.[state.user?.uid];
      if (!me) {
        container.innerHTML = `<div class="text-center p-8"><div class="glass-card bg-red-300 p-6 font-bold text-xl">אירעה שגיאה - לא שובצת למשחק</div></div>`;
        return;
      }

      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      if (window._drawWatch) { clearInterval(window._drawWatch); window._drawWatch = null; }

      const allPlayers = Object.values(data.players);
      const endTime = data.drawingEndTime || (Date.now() + DRAWING_DURATION * 1000);
      const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
      const roundNum = (data.round || 0) + 1;
      const maxRounds = data.maxRounds || 3;

      container.innerHTML = `
        <div class="max-w-lg mx-auto">
          <div class="flex items-center justify-between mb-2">
            <div class="room-label">סיבוב ${roundNum}/${maxRounds}</div>
            <div class="flex items-center gap-2">
              <span class="font-bold text-sm">${allPlayers.length} שחקנים</span>
              <div id="drawing-timer" class="timer-ring ${remaining <= 5 ? 'urgent' : ''}">${remaining}</div>
            </div>
          </div>

          <div class="flex flex-wrap gap-1 mb-2">
            ${allPlayers.map(p => `
              <div class="player-card" style="padding:4px 10px;gap:6px;border-right:4px solid ${playerColor(p.id, data.playerOrder || allPlayers.map(pl => pl.id))}">
                ${renderAvatar(p, 24)}
                <span>${p.name}</span>
              </div>
            `).join('')}
          </div>

          <div class="text-center mb-3">
            ${(data.gameMode || DEFAULT_GAME_MODE) === 'collab' ? `
              <div class="word-display">${me.word}</div>
            ` : !me.isImpostor ? `
              <div class="word-display">${me.word}</div>
            ` : `
              <div>
                <div class="word-display" style="background:#ff6b6b">${me.word}</div>
                <div class="text-sm font-bold mt-1">🕵️ אתה המתחזה! נסה להתאים את עצמך למילה האמיתית</div>
              </div>
            `}
          </div>

          <div class="canvas-wrapper relative" style="aspect-ratio:4/3;max-height:60vh">
            <canvas id="draw-canvas"></canvas>
          </div>

          <div class="mt-3 flex flex-wrap items-center gap-2 drawing-tools">
            <div class="flex gap-1">
              ${COLORS.map(c => `
                <button class="color-btn ${c === state.drawing.currentColor ? 'active' : ''}" data-color="${c}" style="background:${c}"></button>
              `).join('')}
            </div>
            <div class="flex gap-1 mr-2">
              ${WIDTHS.map((w) => `
                <button class="width-btn ${w === state.drawing.currentWidth ? 'active' : ''}" data-width="${w}" style="width:36px;height:36px">
                  <div style="width:${w+2}px;height:${w+2}px;background:#000;border-radius:50%"></div>
                </button>
              `).join('')}
            </div>
            <button id="btn-clear-local" class="btn-purple px-3 py-1 font-bold text-sm">נקה את שלי</button>
          </div>

          ${state.isHost ? `
            <div class="mt-3 glass-card-flat p-3">
              <div class="flex justify-between items-center">
                <span class="font-bold text-sm text-white">כולם מציירים בו-זמנית</span>
                <button id="btn-advance-exh" class="btn-mint px-4 py-1 text-sm font-bold">סיום ציור → תערוכה</button>
              </div>
            </div>
          ` : ''}
        </div>
      `;
      updateAvatarPreviews(container);

      const canvasEl = $('#draw-canvas');
      if (canvasEl) {
        if (canvasEl._cleanup) canvasEl._cleanup();
        setupCollaborativeCanvas(canvasEl, data.strokes || []);

        $$('.color-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.drawing.currentColor = btn.dataset.color;
            $$('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          });
        });

        $$('.width-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.drawing.currentWidth = parseInt(btn.dataset.width);
            $$('.width-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          });
        });

        const clearBtn = $('#btn-clear-local');
        if (clearBtn) clearBtn.addEventListener('click', () => {
          const allStrokes = (state.gameData?.strokes || []).filter(s => s.playerId !== state.user.uid);
          state.drawing.strokes = JSON.parse(JSON.stringify(allStrokes));
          const canvas = state.drawing.canvas;
          if (canvas) {
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width / dpr;
            const h = canvas.height / dpr;
            redrawCanvas(state.drawing.ctx, w, h, state.drawing.strokes);
          }
        });
      }

      // Poll for new strokes from other players
      if (window._drawWatch) clearInterval(window._drawWatch);
      window._drawWatch = setInterval(() => {
        if (!state.gameData) return;
        const allStrokes = state.gameData.strokes || [];
        const canvas = $('#draw-canvas');
        if (!canvas || !state.drawing.ctx) return;
        if (state.drawing.isDrawing) return;
        const localStrokes = state.drawing.strokes;
        const otherStrokes = allStrokes.filter(s => s.playerId !== state.user?.uid);
        if (otherStrokes.length !== localStrokes.filter(s => s.playerId !== state.user?.uid).length) {
          state.drawing.strokes = JSON.parse(JSON.stringify(allStrokes));
          const dpr = window.devicePixelRatio || 1;
          const w = canvas.width / dpr;
          const h = canvas.height / dpr;
          redrawCanvas(state.drawing.ctx, w, h, state.drawing.strokes);
        }
      }, 400);

      // Countdown timer
      const timerEl = $('#drawing-timer');
      if (timerEl) {
        let lastTick = -1;
        state.timerInterval = setInterval(() => {
          const e = data.drawingEndTime || (Date.now() + DRAWING_DURATION * 1000);
          const r = Math.max(0, Math.ceil((e - Date.now()) / 1000));
          timerEl.textContent = r;
          timerEl.className = 'timer-ring' + (r <= 5 ? ' urgent' : '');
          if (r <= 5 && r !== lastTick) { lastTick = r; SOUND.tick(); }
          if (r <= 0 && state.isHost) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            if (state.gameData?.phase === 'drawing') {
              state.gameRef.update({ phase: 'exhibition', voteEndTime: Date.now() + 10000 });
            }
          }
        }, 200);
      }

      const advBtn = $('#btn-advance-exh');
      if (advBtn) advBtn.addEventListener('click', () => {
        SOUND.click();
        if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
        state.gameRef.update({ phase: 'exhibition', voteEndTime: Date.now() + 10000 });
      });
    }

    // ---- EXHIBITION ----
    function renderExhibition(container, data) {
      const me = data.players?.[state.user?.uid];
      const hasVoted = data.votes && data.votes[state.user?.uid];
      const allPlayers = Object.values(data.players);
      const playerOrder = data.playerOrder || allPlayers.map(p => p.id);
      const roundNum = (data.round || 0) + 1;
      const maxRounds = data.maxRounds || 3;
      const voteEndTime = data.voteEndTime || (Date.now() + 10000);

      container.innerHTML = `
        <div class="max-w-3xl mx-auto">
          <div class="text-center mb-6">
            <h1 class="text-4xl font-black mb-2 text-white">🖼️ תערוכת הכאוס</h1>
            <p class="font-bold text-lg" style="color:#00e5a0">סיבוב ${roundNum}/${maxRounds} — ${(data.gameMode || DEFAULT_GAME_MODE) === 'collab' ? 'מי צייר הכי טוב בסיבוב הזה?' : 'מי לדעתך המתחזה?'}</p>
            <div class="flex items-center justify-center gap-2 mt-2">
              <div class="timer-ring" id="vote-timer" style="width:44px;height:44px;font-size:18px">10</div>
              <span class="hint-text">שניות להצבעה</span>
            </div>
          </div>

          <div class="glass-card p-4 mb-4">
            <div style="aspect-ratio:4/3;max-height:50vh;background:#fff;position:relative">
              <canvas id="exh-canvas-main" style="width:100%;height:100%"></canvas>
            </div>
            <div class="flex flex-wrap gap-2 mt-3 justify-center">
              ${allPlayers.map(p => `
                <div class="player-card" style="padding:4px 10px;gap:6px;border-right:4px solid ${playerColor(p.id, playerOrder)}">
                  <div class="player-avatar" style="width:28px;height:28px;font-size:14px">${renderAvatar(p, 28)}</div>
                  <span class="font-bold text-xs">${p.name}</span>
                </div>
              `).join('')}
            </div>
          </div>

          ${!hasVoted ? `
            <div id="vote-section" class="glass-card p-6">
              <h2 class="text-xl font-black mb-3 text-white">🗳️ ${(data.gameMode || DEFAULT_GAME_MODE) === 'collab' ? 'הצבע על הציור הכי טוב' : 'הצבע על המתחזה'}</h2>
              <p class="text-sm font-bold mb-3 hint-text">${(data.gameMode || DEFAULT_GAME_MODE) === 'collab' ? 'מי לדעתך צייר הכי טוב בסיבוב הזה?' : 'מי לדעתך הוא המתחזה בסיבוב הזה?'}</p>
              <div class="flex flex-wrap gap-3">
                ${allPlayers
                  .filter(p => p.id !== state.user?.uid)
                  .map(p => `
                    <button class="vote-player-btn px-4 py-3 flex items-center gap-2" data-target="${p.id}"
                      style="background:${playerColor(p.id, playerOrder)};border:2px solid ${playerColor(p.id, playerOrder)};border-radius:12px;cursor:pointer;transition:all 0.15s ease;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,0.2)">
                      ${renderAvatar(p, 36)}
                      <span class="font-bold" style="color:#fff;text-shadow:0 0 3px #000,0 0 3px #000,0 1px 2px rgba(0,0,0,0.5)">${p.name}</span>
                    </button>
                  `).join('')}
              </div>
            </div>
          ` : `
            <div class="glass-card-flat p-4 text-center" style="background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.2)">
              <p class="font-bold text-lg" style="color:#00e5a0">✅ הצבעת! ממתין לשאר השחקנים...</p>
              <p class="text-sm hint-text mt-1">(${Object.keys(data.votes || {}).length}/${allPlayers.length} הצביעו)</p>
            </div>
          `}

          ${state.isHost && allVotesIn(data) ? `
            <div class="mt-4 text-center">
              <button id="btn-to-reveal" class="btn-mint px-8 py-4 text-xl font-bold">${(data.gameMode || DEFAULT_GAME_MODE) === 'collab' ? '🏆 גלו את הזוכה!' : '🔍 גלו את המתחזה!'}</button>
            </div>
          ` : state.isHost ? `
            <div class="mt-4 text-center">
              <div class="glass-card-flat p-4 font-bold">
                ממתין להצבעות... (${Object.keys(data.votes || {}).length}/${allPlayers.length})
              </div>
            </div>
          ` : ''}
        </div>
      `;
      updateAvatarPreviews(container);

      // Render drawing with player-colored strokes
      setTimeout(() => {
        const canvasEl = document.getElementById('exh-canvas-main');
        if (!canvasEl) return;
        const container_ = canvasEl.parentElement;
        const dpr = window.devicePixelRatio || 1;
        const w = container_.clientWidth;
        const h = container_.clientHeight;
        canvasEl.width = w * dpr;
        canvasEl.height = h * dpr;
        canvasEl.style.width = w + 'px';
        canvasEl.style.height = h + 'px';
        const ctx = canvasEl.getContext('2d');
        ctx.scale(dpr, dpr);
        const strokes = data.strokes || [];
        const colored = strokes.map(s => ({ ...s, color: playerColor(s.playerId, playerOrder) }));
        redrawCanvas(ctx, w, h, colored);
      }, 50);

      // Vote timer
      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      state.timerInterval = setInterval(() => {
        const timerEl = $('#vote-timer');
        if (!timerEl) return;
        const r = Math.max(0, Math.ceil((voteEndTime - Date.now()) / 1000));
        timerEl.textContent = r;
        timerEl.className = 'timer-ring' + (r <= 3 ? ' urgent' : '');
        if (r <= 3 && r > 0) SOUND.tick();
        if (r <= 0) {
          clearInterval(state.timerInterval);
          state.timerInterval = null;
          if (state.isHost && state.gameData?.phase === 'exhibition') {
            SOUND.alarm();
            advanceToReveal();
          }
        }
      }, 200);

      $$('.vote-player-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          SOUND.vote();
          const target = btn.dataset.target;
          btn.disabled = true;
          btn.innerHTML = '✅ הצבעת!';
          await castVote(target);
        });
      });

      const revealBtn = $('#btn-to-reveal');
      if (revealBtn) revealBtn.addEventListener('click', () => { SOUND.click(); advanceToReveal(); });
    }

    // ---- REVEAL ----
    function renderReveal(container, data) {
      const gameMode = data.gameMode || DEFAULT_GAME_MODE;
      const isImpostorMode = gameMode === 'impostor';
      const impostorId = data.impostorId;
      const impostor = data.players[impostorId];
      const allPlayers = Object.values(data.players);
      const playerOrder = data.playerOrder || allPlayers.map(p => p.id);
      const votes = Object.entries(data.votes || {})
        .map(([voterId, targetId]) => ({ voterId, targetId }));
      const totalVoters = votes.length;
      const roundNum = (data.round || 0) + 1;
      const maxRounds = data.maxRounds || DEFAULT_MAX_ROUNDS;
      const isLastRound = (data.round || 0) >= maxRounds - 1;

      let votesForImpostor = 0, impostorCaught = false;
      if (isImpostorMode) {
        votesForImpostor = votes.filter(v => v.targetId === impostorId).length;
        impostorCaught = votesForImpostor > totalVoters / 2;
      }

      container.innerHTML = `
        <div class="max-w-3xl mx-auto">
          <div class="text-center mb-4">
            <h1 class="text-4xl font-black mb-2" style="color:#00e5a0">🔍 חשיפה! סיבוב ${roundNum}</h1>
            <p class="font-bold" style="color:#8b7aaa">המילה הייתה: <span style="color:#00e5a0">${data.word}</span></p>
          </div>

          <div class="text-center mb-2">
            <span class="vote-drumroll" style="display:inline-block;font-size:32px;animation:drumrollSpin 0.8s ease-out">🎰</span>
            <span class="vote-drumroll" style="display:inline-block;font-size:18px;font-weight:700;color:#8b7aaa;animation:drumrollFade 0.8s ease-out forwards">סופרים קולות...</span>
          </div>

          <div class="glass-card p-6 mb-4" style="position:relative">
            <div style="aspect-ratio:4/3;max-height:40vh;background:#fff" class="mb-4">
              <canvas id="reveal-canvas" style="width:100%;height:100%"></canvas>
            </div>

            <div class="flex flex-wrap gap-2 mb-4 justify-center">
              ${allPlayers.map(p => {
                const voteInfo = votes.find(v => v.voterId === p.id);
                const rDelay = Math.random() * 0.6;
                return `
                <div class="player-card vote-reveal-card ${p.id === impostorId ? 'shock' : ''}" style="${p.id === impostorId ? 'border-color:#ff6b6b;background:#2a1452;position:relative' : ''};animation-delay:${rDelay}s">
                  <div class="player-avatar" style="width:40px;height:40px">${renderAvatar(p, 40)}</div>
                  <span class="font-bold">${p.name}</span>
                  ${p.id === impostorId ? '<span class="impostor-badge">⚡ מִתְחַזֶה ⚡</span>' : ''}
                  ${voteInfo ? `
                    <span class="vote-arrow text-xs font-bold" style="${voteInfo.targetId === impostorId ? 'color:#00e5a0' : '#ff6b6b'}">
                      ${(() => {
                        const arrows = ['➡️', '⬅️', '⬆️', '⬇️', '↗️', '↘️', '↙️', '↖️'];
                        return pick(arrows);
                      })()} ${data.players[voteInfo.targetId]?.name || '?'}
                      ${voteInfo.targetId === impostorId ? '✅' : '❌'}
                    </span>
                  ` : ''}
                  ${p.id === impostorId ? '<div class="shock-overlay"></div>' : ''}
                </div>`;
              }).join('')}
            </div>

            <div class="glass-card-flat p-4 text-center" style="background:${!isImpostorMode ? 'rgba(0,229,160,0.15)' : impostorCaught ? 'rgba(0,229,160,0.15)' : 'rgba(255,107,107,0.15)'};border-color:${!isImpostorMode ? '#00e5a0' : impostorCaught ? '#00e5a0' : '#ff6b6b'}">
              <p class="text-xl font-black" style="color:${!isImpostorMode ? '#00e5a0' : impostorCaught ? '#00e5a0' : '#ff6b6b'}">
                ${!isImpostorMode ? (() => {
                  const voteCounts = {};
                  for (const v of votes) voteCounts[v.targetId] = (voteCounts[v.targetId] || 0) + 1;
                  let bestPid = null, bestCount = 0;
                  for (const [pid, c] of Object.entries(voteCounts)) { if (c > bestCount) { bestCount = c; bestPid = pid; } }
                  const winner = bestPid ? data.players[bestPid] : null;
                  return `🏆 הזוכה בסיבוב: ${winner?.name || '?'} (${bestCount} קולות)`;
                })() : impostorCaught
                  ? `⚡ ${impostor?.name || 'המתחזה'} נתפס! (${votesForImpostor}/${totalVoters} הצביעו נכון)`
                  : `🏃 ${impostor?.name || 'המתחזה'} הצליח לברוח! (רק ${votesForImpostor}/${totalVoters} זיהו אותו)`}
              </p>
            </div>
          </div>

          ${state.isHost ? `
            <div class="text-center">
              <button id="btn-next-phase" class="btn-mint px-8 py-3 text-xl font-bold">
                ${isLastRound ? '🏆 לוח הניקוד' : 'הסיבוב הבא →'}
              </button>
            </div>
          ` : `
            <div class="text-center">
              <div class="glass-card-flat p-4 font-bold" style="color:#8b7aaa">ממתין שהמארח יעבור לשלב הבא...</div>
            </div>
          `}
        </div>
      `;
      updateAvatarPreviews(container);

      // Drumroll before reveal
      for (let i = 0; i < 6; i++) {
        setTimeout(() => SOUND.tick(), 100 + i * 60);
      }
      setTimeout(SOUND.reveal, 500);

      setTimeout(() => {
        const canvasEl = $('#reveal-canvas');
        if (!canvasEl) return;
        const container_ = canvasEl.parentElement;
        const dpr = window.devicePixelRatio || 1;
        const w = container_.clientWidth;
        const h = container_.clientHeight;
        canvasEl.width = w * dpr;
        canvasEl.height = h * dpr;
        canvasEl.style.width = w + 'px';
        canvasEl.style.height = h + 'px';
        const ctx = canvasEl.getContext('2d');
        ctx.scale(dpr, dpr);
        const strokes = data.strokes || [];
        const colored = strokes.map(s => ({ ...s, color: playerColor(s.playerId, playerOrder) }));
        redrawCanvas(ctx, w, h, colored);
      }, 50);

      const nextBtn = $('#btn-next-phase');
      if (nextBtn) {
        nextBtn.addEventListener('click', () => {
          SOUND.click();
          if (isLastRound) {
            spawnConfetti();
            setTimeout(SOUND.win, 300);
            state.gameRef.update({ phase: 'leaderboard' });
          } else {
            advanceToNextRound();
          }
        });
      }
    }

    function renderLeaderboard(container, data) {
      const players = Object.values(data.players || {}).sort((a, b) => (b.score || 0) - (a.score || 0));
      const maxScore = players[0]?.score || 0;
      const roundResults = data.roundResults || [];
      const gameMode = data.gameMode || DEFAULT_GAME_MODE;
      const isImpostorMode = gameMode === 'impostor';
      const isBrokenPhone = gameMode === 'broken-phone';
      const isAlias = gameMode === 'alias';

      container.innerHTML = `
        <div class="max-w-2xl mx-auto reveal-overlay">
          <div class="text-center mb-8">
            <h1 class="text-5xl font-black mb-2 text-white">🏆 לוח הניקוד</h1>
          </div>

          <div class="glass-card p-6">
            ${players.map((p, i) => `
              <div class="flex items-center gap-3 py-3 stagger-in" style="animation-delay:${i*0.1}s;${i > 0 ? 'border-top:2px dashed rgba(0,229,160,0.15)' : ''}">
                <div class="text-2xl font-black w-10 text-center">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}</div>
                <div class="player-avatar" style="width:44px;height:44px">${renderAvatar(p, 44)}</div>
                <div class="flex-1">
                  <div class="font-bold text-lg text-white">${p.name} ${p.id === data.hostId ? '(מארח)' : ''}</div>
                  <div class="text-sm hint-text">${isAlias ? '🗣️ אליאס' : isBrokenPhone ? '📞 טלפון שבור' : !isImpostorMode ? '🎨 צייר' : p.isImpostor ? '⚡ היה מתחזה' : '🎨 היה צייר'}</div>
                </div>
                <div class="text-3xl font-black" style="color:#00e5a0">${p.score || 0}</div>
              </div>
            `).join('')}
          </div>

          ${!isBrokenPhone && roundResults.length > 0 ? `
            <div class="glass-card p-4 mt-4">
              <div class="section-title mb-3">📋 תוצאות לפי סיבוב</div>
              ${roundResults.map((rr, ri) => {
                const imp = rr.impostorId ? data.players[rr.impostorId] : null;
                return `
                  <div class="glass-card-flat p-3 mb-2">
                    <div class="font-bold text-sm" style="color:#00e5a0">סיבוב ${ri + 1}</div>
                    <div class="text-xs">מילה: <span class="font-bold">${rr.word}</span></div>
                    ${isImpostorMode && imp ? `<div class="text-xs">מתחזה: ${imp?.name || '?'} ${rr.impostorCaught ? '✅ נתפס' : '🏃 ברח'}</div>` : ''}
                    ${!isImpostorMode && rr.winnerId ? `<div class="text-xs">זוכה: <span class="font-bold">${data.players[rr.winnerId]?.name || '?'}</span></div>` : ''}
                    ${isImpostorMode ? `<div class="text-xs">${rr.votesForImpostor}/${rr.totalVoters} הצביעו נכון</div>` : ''}
                  </div>
                `;
              }).join('')}
            </div>
          ` : isBrokenPhone && data.chainVotes && Object.keys(data.chainVotes).length > 0 ? `
            <div class="glass-card p-4 mt-4">
              <div class="section-title mb-3">📊 תוצאות ההצבעה</div>
              ${(() => {
                const cv = data.chainVotes || {};
                const counts = {};
                const playerOrder = data.playerOrder || Object.keys(data.players || {});
                for (const v of Object.values(cv)) {
                  counts[v] = (counts[v] || 0) + 1;
                }
                let winnerChain = null, winnerCount = 0;
                for (const [ci, cnt] of Object.entries(counts)) {
                  if (cnt > winnerCount) { winnerCount = cnt; winnerChain = parseInt(ci); }
                }
                const winnerPid = playerOrder[winnerChain];
                const winnerP = winnerPid ? data.players[winnerPid] : null;
                return playerOrder.map((pid, ci) => {
                  const p = data.players[pid];
                  const cnt = counts[ci] || 0;
                  return `<div class="glass-card-flat p-2 mb-1 flex items-center gap-2 ${ci === winnerChain ? 'ring-2' : ''}" style="${ci === winnerChain ? 'border-color:#00e5a0;background:rgba(0,229,160,0.08)' : ''}">
                    <span class="font-bold text-sm">${p?.name || '?'}</span>
                    <span class="text-xs hint-text">${cnt} הצבעות</span>
                    ${ci === winnerChain ? '<span class="font-bold text-xs" style="color:#00e5a0">🏆 מנצח</span>' : ''}
                  </div>`;
                }).join('');
              })()}
            </div>
          ` : ''}

          <div class="text-center mt-8">
            <button id="btn-new-game" class="btn-mint px-8 py-4 text-xl font-bold">🔄 משחק חדש</button>
          </div>
        </div>
      `;
      updateAvatarPreviews(container);

      const newBtn = $('#btn-new-game');
      if (newBtn) {
        newBtn.addEventListener('click', () => {
          resetState();
          render();
        });
      }
    }

    // ============================================================
    // PLAY AGAIN / RESET
    // ============================================================
    function resetState() {
      if (state.unsub) { state.unsub();
        state.unsub = null; }
      if (state.timerInterval) { clearInterval(state.timerInterval);
        state.timerInterval = null; }
      if (window._drawWatch) { clearInterval(window._drawWatch);
        window._drawWatch = null; }
      state.gameId = null;
      state.gameRef = null;
      state.gameData = null;
      state.isHost = false;
      state.drawing = {
        canvas: null,
        ctx: null,
        isDrawing: false,
        currentColor: COLORS[0],
        currentWidth: WIDTHS[1],
        strokes: [],
        currentStroke: null,
        canvasId: null,
      };
    }

    // ============================================================
    // CONFETTI
    // ============================================================
    function spawnConfetti() {
      const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff9ff3', '#ff8c00', '#48dbfb'];
      for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = pick(colors);
        el.style.width = (6 + Math.random() * 10) + 'px';
        el.style.height = (6 + Math.random() * 10) + 'px';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.animationDelay = Math.random() * 2 + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 6000);
      }
    }

    // ============================================================
    // INIT
    // ============================================================
    render();

    // Check URL params for game code
    const params = new URLSearchParams(window.location.search);
    if (params.has('room') || params.has('code')) {
      const codeInput = document.getElementById('join-code');
      if (codeInput) codeInput.value = (params.get('room') || params.get('code')).toUpperCase();
    }

    console.log('🎨 Mobiground loaded!');
    console.log('Firebase project:', FIREBASE_CONFIG.projectId);
    console.log('Set window.__firebase_config to configure Firebase');
  </script>
</body>
</html>
